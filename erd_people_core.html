
<style>
#erd1 svg { width: 100% !important; }
.erd-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 8px; letter-spacing: 0.03em; }
</style>
<p class="erd-title">Group 1 — People & Authentication</p>
<div id="erd1"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false, theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark, fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd1-svg', `erDiagram
  USER_ACCOUNT {
    int user_id PK
    string username UK
    string email UK
    string password_hash
    string role
    int profile_id
    string profile_type
  }
  PATIENT {
    int patient_number PK
    string ssn UK
    string name
    string address
    string phone
    date birthdate
    char sex
    text medical_history
    string blood_pressure
    int heart_rate
    float temperature
    string blood_type
  }
  DOCTOR {
    int doctor_id PK
    string ssn UK
    string license_number UK
    string name
    char sex
    date birth_date
    string major_area
    string degree
    date join_date
    decimal consultation_fee
    string phone
    int department_code FK
  }
  NURSE {
    int nurse_id PK
    string ssn UK
    string name
    char sex
    string phone
    int department_code FK
    int room_id FK
  }
  EMPLOYEE {
    int employee_id PK
    string ssn UK
    string name
    string role
    int department_code FK
  }
  USER_ACCOUNT ||--o| PATIENT : "is (patient)"
  USER_ACCOUNT ||--o| DOCTOR : "is (doctor)"
  USER_ACCOUNT ||--o| NURSE : "is (nurse)"
  USER_ACCOUNT ||--o| EMPLOYEE : "is (employee)"
`);
document.getElementById('erd1').innerHTML = svg;
document.querySelectorAll('#erd1 .node').forEach(node => {
  const fp = node.querySelector('path[d]');
  if (!fp) return;
  const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0],nums[2],nums[4],nums[6]], ys = [nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
document.querySelectorAll('#erd1 .row-rect-odd path, #erd1 .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
