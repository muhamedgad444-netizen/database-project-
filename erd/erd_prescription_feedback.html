
<style>
#erd4 svg { width: 100% !important; }
.erd-title4 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 8px; letter-spacing: 0.03em; }
</style>
<p class="erd-title4">Group 4 — Prescriptions, Medications & Feedback</p>
<div id="erd4"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false, theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark, fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd4-svg', `erDiagram
  DOCTOR {
    int doctor_id PK
    string name
  }
  PATIENT {
    int patient_number PK
    string name
  }
  PRESCRIPTION {
    int prescription_id PK
    int doctor_id FK
    int patient_number FK
    date prescription_date
  }
  PRESCRIPTION_MEDICATION {
    int prescription_id PK
    int medication_id PK
    int times_per_day
    string dose
    text directions
    date start_date
    date end_date
  }
  MEDICATION {
    int medication_id PK
    string name
    text description
  }
  USER_ACCOUNT {
    int user_id PK
    string username
    string role
  }
  CONTACT_FORM {
    int form_id PK
    int user_id FK
    string subject
    text message
    int rating
    datetime submitted_at
    string status
  }
  DOCTOR ||--o{ PRESCRIPTION : "writes"
  PATIENT ||--o{ PRESCRIPTION : "receives"
  PRESCRIPTION ||--|{ PRESCRIPTION_MEDICATION : "contains"
  MEDICATION ||--|{ PRESCRIPTION_MEDICATION : "listed in"
  USER_ACCOUNT ||--o{ CONTACT_FORM : "submits"
`);
document.getElementById('erd4').innerHTML = svg;
document.querySelectorAll('#erd4 .node').forEach(node => {
  const fp = node.querySelector('path[d]');
  if (!fp) return;
  const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
document.querySelectorAll('#erd4 .row-rect-odd path, #erd4 .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
