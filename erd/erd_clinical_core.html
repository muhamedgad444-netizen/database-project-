
<style>
#erd3 svg { width: 100% !important; }
.erd-title3 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 8px; letter-spacing: 0.03em; }
</style>
<p class="erd-title3">Group 3 — Clinical (Examinations, Admissions, Appointments, Records, Scans)</p>
<div id="erd3"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false, theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark, fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd3-svg', `erDiagram
  PATIENT {
    int patient_number PK
    string name
    string ssn UK
  }
  DOCTOR {
    int doctor_id PK
    string name
  }
  DEPARTMENT {
    int department_code PK
    string name
  }
  ROOM {
    int room_id PK
    string room_number
  }
  EXAMINES {
    int doctor_id PK
    int patient_number PK
    int hours_per_week
  }
  ADMISSION {
    int admission_id PK
    int patient_number FK
    int department_code FK
    date admission_date
    date discharge_date
    string status
  }
  APPOINTMENT {
    int appointment_id PK
    int patient_number FK
    int doctor_id FK
    datetime scheduled_at
    string status
    decimal fee
    string payment_status
    date refund_date
  }
  ROOM_RESERVATION {
    int reservation_id PK
    int room_id FK
    int doctor_id FK
    int patient_number FK
    date start_date
    date end_date
  }
  MEDICAL_RECORD {
    int record_id PK
    int patient_number FK
    int doctor_id FK
    text diagnosis
    text treatment
    date record_date
  }
  SCAN_FILE {
    int scan_id PK
    int patient_number FK
    int doctor_id FK
    string file_path
    string file_type
    datetime uploaded_at
  }
  DOCTOR ||--o{ EXAMINES : "examines"
  PATIENT ||--o{ EXAMINES : "examined by"
  PATIENT ||--o{ ADMISSION : "admitted"
  DEPARTMENT ||--o{ ADMISSION : "admits to"
  PATIENT ||--o{ APPOINTMENT : "schedules"
  DOCTOR ||--o{ APPOINTMENT : "has"
  DOCTOR ||--o{ ROOM_RESERVATION : "reserves"
  PATIENT ||--o{ ROOM_RESERVATION : "for patient"
  ROOM ||--o{ ROOM_RESERVATION : "reserved as"
  PATIENT ||--o{ MEDICAL_RECORD : "has record"
  DOCTOR ||--o{ MEDICAL_RECORD : "writes"
  PATIENT ||--o{ SCAN_FILE : "has scan"
  DOCTOR ||--o{ SCAN_FILE : "uploads"
`);
document.getElementById('erd3').innerHTML = svg;
document.querySelectorAll('#erd3 .node').forEach(node => {
  const fp = node.querySelector('path[d]');
  if (!fp) return;
  const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs=[nums[0],nums[2],nums[4],nums[6]],ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);r.setAttribute('rx','8');
  for(const a of['fill','stroke','stroke-width','class','style']) if(fp.hasAttribute(a)) r.setAttribute(a,fp.getAttribute(a));
  fp.replaceWith(r);
});
document.querySelectorAll('#erd3 .row-rect-odd path, #erd3 .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
